apiVersion: v1
kind: Secret
metadata:
  name: thunderbolt-secrets
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
type: Opaque
data:
  oidc-client-secret: {{ .Values.keycloak.oidc.clientSecretBase64 }}
  powersync-jwt-secret: {{ .Values.powersync.jwt.secretBase64 }}
  postgres-password: {{ .Values.postgres.credentials.passwordBase64 }}
  better-auth-secret: {{ required "backend.betterAuthSecretBase64 is required — generate with: echo -n 'your-secret' | base64" .Values.backend.betterAuthSecretBase64 }}
  powersync-db-password: {{ .Values.powersync.db.passwordBase64 }}
