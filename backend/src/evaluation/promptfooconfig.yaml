# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Thunderbolt LLM Evaluation Suite

# Prompts - the {{query}} variable will be substituted from test cases
prompts:
  - '{{query}}'

# Shared transform function that extracts BOTH content AND tool calls from SSE
# This enables evaluating whether tools were called appropriately
x-transform: &sse_parser |
  (json, text) => {
    let content = '';
    const toolCalls = [];
    
    for (const line of String(text || '').split('\n')) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data: ')) continue;
      if (trimmed === 'data: [DONE]') break;
      
      try {
        const evt = JSON.parse(trimmed.slice(6));
        const delta = evt.choices?.[0]?.delta;
        
        // Accumulate text content
        if (delta?.content) {
          content += delta.content;
        }
        
        // Capture tool calls
        if (delta?.tool_calls) {
          for (const tc of delta.tool_calls) {
            let existing = toolCalls[tc.index];
            if (!existing) {
              existing = { id: '', name: '', arguments: '' };
              toolCalls[tc.index] = existing;
            }
            if (tc.id) existing.id = tc.id;
            if (tc.function?.name) existing.name = tc.function.name;
            if (tc.function?.arguments) existing.arguments += tc.function.arguments;
          }
        }
      } catch {}
    }
    
    // Return structured output for evaluation
    const validToolCalls = toolCalls.filter(t => t && t.name);
    
    if (validToolCalls.length > 0) {
      const toolsUsed = validToolCalls.map(t => `- ${t.name}(${t.arguments})`).join('\n');
      return `TOOLS_CALLED: YES\nTOOL_NAMES: ${validToolCalls.map(t => t.name).join(', ')}\nTOOL_DETAILS:\n${toolsUsed}\n\nRESPONSE:\n${content.trim()}`;
    }
    
    return `TOOLS_CALLED: NO\n\nRESPONSE:\n${content.trim()}`;
  }

# HTTP providers pointing to the backend's /v1/chat/completions endpoint
providers:
  - id: https
    label: gpt-oss-120b
    config:
      url: http://localhost:8000/v1/chat/completions
      method: POST
      headers:
        Content-Type: application/json
      body:
        model: gpt-oss-120b
        messages:
          - role: user
            content: '{{prompt}}'
        stream: true
        temperature: 0.2
      transformResponse: *sse_parser

  - id: https
    label: mistral-medium-3.1
    config:
      url: http://localhost:8000/v1/chat/completions
      method: POST
      headers:
        Content-Type: application/json
      body:
        model: mistral-medium-3.1
        messages:
          - role: user
            content: '{{prompt}}'
        stream: true
        temperature: 0.2
      transformResponse: *sse_parser

  - id: https
    label: mistral-large-3
    config:
      url: http://localhost:8000/v1/chat/completions
      method: POST
      headers:
        Content-Type: application/json
      body:
        model: mistral-large-3
        messages:
          - role: user
            content: '{{prompt}}'
        stream: true
        temperature: 0.2
      transformResponse: *sse_parser

  - id: https
    label: sonnet-4.5
    config:
      url: http://localhost:8000/v1/chat/completions
      method: POST
      headers:
        Content-Type: application/json
      body:
        model: sonnet-4.5
        messages:
          - role: user
            content: '{{prompt}}'
        stream: true
        temperature: 0.2
      transformResponse: *sse_parser

# Default test configuration - use Claude as judge since ANTHROPIC_API_KEY is set
defaultTest:
  options:
    provider: anthropic:messages:claude-sonnet-4-20250514

# Sample test case for quick validation
tests:
  - description: Basic greeting response
    vars:
      query: Hello! How can you help me today?
    assert:
      - type: llm-rubric
        value: |
          Evaluate if the response is a friendly, helpful greeting.
          Note: TOOLS_CALLED should be NO for this simple greeting.

          SCORING:
          - 1.0: Friendly, helpful, no unnecessary tool calls
          - 0.7-0.9: Acceptable greeting
          - 0.0-0.3: Unfriendly or inappropriate tool usage

# Output configuration
outputPath: ./eval-results.json
